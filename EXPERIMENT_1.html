<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
    <link rel="stylesheet" href="job.css">
</head>
<body>

    <div class="header">
        <h1>JobPortal</h1>
        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Companies</a></li>
            <li><a href="#">Login</a></li>
        </ul>
    </div>

    <div class="main">
        <h2>Find Your Dream Job</h2>
        <p>Search jobs by skill, company, or location</p>

        <div class="search-box">
            <input type="text" placeholder="Skill">
            <input type="text" placeholder="Location">
            <button>Search</button>
        </div>
    </div>


    <div class="categories">
        <h2>Popular Categories</h2>

        <div class="box">IT Jobs</div>
        <div class="box">Government Jobs</div>
        <div class="box">Internships</div>
        <div class="box">Fresher Jobs</div>
    </div>


    <div class="footer">
        <p>© 2026 JobPortal | All Rights Reserved</p>
    </div>

</body>
</html>
